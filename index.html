<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Kadapa Prayer Times</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Topbar -->
    <header class="topbar">
        <div class="container">
            <div class="topbar-content">
                <i class="fas fa-mosque"></i>
                <div class="logo-text">Kadapa Salah Times</div>
            </div>
        </div>
    </header>

    <!-- Time and Date Section -->
    <section class="time-date-section">
        <div class="container">
            <div class="time-date-container">
                <div class="time-display">
                    <div class="current-time">
                        <span id="currentTimeNumbers">--:--:--</span>
                        <span id="currentTimeAMPM" class="ampm">--</span>
                    </div>
                </div>
                <div class="date-display">
                    <div class="english-date" id="currentDate">--</div>
                    <div class="hijri-date" id="hijriDate">--</div>
                </div>
            </div>
        </div>
    </section>

    <!-- Prayer Times Card -->
    <section class="prayer-section">
        <div class="container">
            <div class="prayer-card">
                

                <div class="times-grid">
                    <div class="time-item">
                        <div class="time-label">Sehri End</div>
                        <div class="time-value" id="sahri-time">--:--</div>
                    </div>
                    <div class="time-item">
                        <div class="time-label">Fajar</div>
                        <div class="time-value" id="fajar-time">--:--</div>
                    </div>
                    <div class="time-item">
                        <div class="time-label">Sunrise</div>
                        <div class="time-value" id="sunrise-time">--:--</div>
                    </div>
                    <div class="time-item">
                        <div class="time-label">Zohar</div>
                        <div class="time-value" id="zohar-time">--:--</div>
                    </div>
                    <div class="time-item">
                        <div class="time-label">Asar</div>
                        <div class="time-value" id="asar-time">--:--</div>
                    </div>
                    <div class="time-item">
                        <div class="time-label">Maghrib</div>
                        <div class="time-value" id="maghrib-time">--:--</div>
                    </div>
                    <div class="time-item">
                        <div class="time-label">Isha</div>
                        <div class="time-value" id="isha-time">--:--</div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js" defer></script>
</body>
</html>
